<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mang Jadid</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal-900: #061e1e;
      --teal-800: #0a2e2e;
      --teal-700: #0e3d3d;
      --teal-500: #1a7a7a;
      --teal-400: #22a0a0;
      --teal-300: #2ab8b8;
      --gold-500: #c9a84c;
      --gold-300: #e8c96a;
      --white:    #ffffff;
    }

    html { height: 100%; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      background: var(--teal-900);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    /* ── Background layers ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(26,122,122,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(201,168,76,0.07) 0%, transparent 60%),
        linear-gradient(160deg, #061e1e 0%, #0a2e2e 40%, #0c3535 100%);
      z-index: 0;
    }

    /* Subtle grid texture */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
    }

    /* ── Wrapper ── */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 0;
      animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header (logo area) ── */
    .header {
      text-align: center;
      padding: 0 0 36px;
    }

    .logo-img {
      height: 56px;
      width: auto;
      filter: drop-shadow(0 4px 20px rgba(42,184,184,0.35));
      animation: fadeUp 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both;
    }

    .tagline {
      margin-top: 12px;
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      animation: fadeUp 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 40px 80px rgba(0,0,0,0.5),
        0 1px 0 rgba(255,255,255,0.06) inset;
      animation: fadeUp 0.6s 0.2s cubic-bezier(0.22,1,0.36,1) both;
    }

    /* Top shimmer line */
    .card-top-line {
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(42,184,184,0.6) 30%,
        rgba(201,168,76,0.6) 70%,
        transparent 100%);
    }

    .card-inner {
      padding: 32px 28px 28px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-label::before,
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    /* ── Role buttons ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .role-btn {
      display: grid;
      grid-template-columns: 48px 1fr 20px;
      align-items: center;
      gap: 14px;
      padding: 18px 18px;
      border-radius: 16px;
      border: 1px solid transparent;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s cubic-bezier(0.22,1,0.36,1),
                  box-shadow 0.2s ease,
                  border-color 0.2s ease;
    }

    .role-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    /* Saku Santri */
    .btn-santri {
      background: rgba(42,184,184,0.07);
      border-color: rgba(42,184,184,0.15);
    }
    .btn-santri::after {
      background: linear-gradient(135deg, rgba(42,184,184,0.1) 0%, transparent 60%);
    }
    .btn-santri:hover {
      border-color: rgba(42,184,184,0.4);
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(42,184,184,0.1);
    }
    .btn-santri:hover::after { opacity: 1; }
    .btn-santri:active { transform: translateY(0); }

    /* Bendahara */
    .btn-bendahara {
      background: rgba(201,168,76,0.06);
      border-color: rgba(201,168,76,0.14);
    }
    .btn-bendahara::after {
      background: linear-gradient(135deg, rgba(201,168,76,0.1) 0%, transparent 60%);
    }
    .btn-bendahara:hover {
      border-color: rgba(201,168,76,0.38);
      transform: translateY(-2px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(201,168,76,0.08);
    }
    .btn-bendahara:hover::after { opacity: 1; }
    .btn-bendahara:active { transform: translateY(0); }

    /* Icon */
    .icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .btn-santri .icon-wrap { background: rgba(42,184,184,0.12); }
    .btn-bendahara .icon-wrap { background: rgba(201,168,76,0.12); }

    /* Text */
    .btn-text { position: relative; z-index: 1; }

    .btn-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 3px;
      letter-spacing: -0.1px;
    }

    .btn-desc {
      font-size: 12px;
      font-weight: 400;
      color: rgba(255,255,255,0.45);
      line-height: 1.4;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      margin-top: 6px;
    }
    .badge-teal {
      background: rgba(42,184,184,0.12);
      color: var(--teal-300);
      border: 1px solid rgba(42,184,184,0.2);
    }
    .badge-gold {
      background: rgba(201,168,76,0.1);
      color: var(--gold-300);
      border: 1px solid rgba(201,168,76,0.2);
    }

    /* Arrow */
    .btn-arrow {
      font-size: 18px;
      color: rgba(255,255,255,0.2);
      position: relative;
      z-index: 1;
      transition: transform 0.2s, color 0.2s;
      justify-self: end;
    }
    .btn-santri:hover .btn-arrow {
      color: var(--teal-300);
      transform: translateX(3px);
    }
    .btn-bendahara:hover .btn-arrow {
      color: var(--gold-300);
      transform: translateX(3px);
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.05);
      margin: 24px 0 20px;
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-brand {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.04em;
    }

    .footer-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
    }

    .footer-year {
      font-size: 11px;
      color: rgba(255,255,255,0.15);
    }

    @media (prefers-reduced-motion: reduce) {
      .wrapper, .logo-img, .tagline, .card,
      .role-btn, .btn-arrow { animation: none; transition: none; }
    }
  </style>
</head>
